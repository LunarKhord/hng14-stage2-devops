name: CI/CD Pipeline (2026 Modernized)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write # Required for SARIF upload

jobs:
  # ──────────────────────────────────────────────────
  # Stage 1: Static Analysis & Linting
  # ──────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6                    

      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 api/ || true

      - name: Lint JavaScript (eslint)
        run: |
          cd frontend
          npm install eslint --save-dev
          npx eslint app.js || true

      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.3.0        
        with:
          dockerfile: "**/Dockerfile"

  # ──────────────────────────────────────────────────
  # Stage 2: Automated Unit Testing
  # ──────────────────────────────────────────────────
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize Python Environment
        uses: actions/setup-python@v6
        with:
          python-version: '3.13' # Leveraging the 2026 stable branch

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov fakeredis httpx

      - name: Execute unit tests with coverage metrics
        run: |
          cd api
          pytest --cov=app --cov-report=xml:coverage.xml --junitxml=test-results.xml

      - name: Persist coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: api/coverage.xml

  # ──────────────────────────────────────────────────
  # Stage 3: Container Image Orchestration
  # ──────────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host

      - name: Synthesize and push microservice images
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v7
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

      - name: Externalize images for cross-job transport
        run: |
          docker save localhost:5000/api:${{ github.sha }} -o api.tar
          docker save localhost:5000/worker:${{ github.sha }} -o worker.tar
          docker save localhost:5000/frontend:${{ github.sha }} -o frontend.tar

      - name: Persist image artifacts (unzipped)
        uses: actions/upload-artifact@v7
        with:
          name: docker-images
          path: |
            api.tar
            worker.tar
            frontend.tar
          retention-days: 1
          archive: false # New v7/v8 feature: avoid redundant compression

  # ──────────────────────────────────────────────────
  # Stage 4: Vulnerability Assessment (Trivy Safe-Pin)
  # ──────────────────────────────────────────────────
  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Retrieve image artifacts
        uses: actions/download-artifact@v8
        with:
          name: docker-images

      - name: Reconstitute Docker images
        run: |
          docker load -i api.tar
          docker load -i worker.tar
          docker load -i frontend.tar

      - name: Vulnerability Scan (API)
        uses: aquasecurity/trivy-action@v0.35.0 # PINNED for security compliance
        with:
          image-ref: 'api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results-api.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Vulnerability Scan (Worker)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'worker:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results-worker.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Vulnerability Scan (Frontend)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'frontend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results-frontend.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Transmission of SARIF telemetry
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results-api.sarif,trivy-results-worker.sarif,trivy-results-frontend.sarif'

  # ──────────────────────────────────────────────────
  # Stage 5: System Integration Validation
  # ──────────────────────────────────────────────────
  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Instantiate full-stack environment
        run: docker compose -f docker-compose.yml up -d

      - name: Service Health Interrogation
        run: |
          for i in {1..12}; do
            HEALTHY=$(docker compose ps --format json | jq 'select(.Health == "healthy")' | wc -l)
            if [ "$HEALTHY" -ge 4 ]; then
              echo "Health check consensus reached."
              exit 0
            fi
            sleep 5
          done
          echo "System health timeout exceeded."
          exit 1

      - name: Execute end-to-end transaction
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit -H "Content-Type: application/json" | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Asynchronous status polling
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:3000/status/${{ env.JOB_ID }} | jq -r '.status')
            echo "Transaction Status (Attempt $i): $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Environmental Deconstruction
        if: always()
        run: docker compose down -v

  # ──────────────────────────────────────────────────
  # Stage 6: Rolling Deployment
  # ──────────────────────────────────────────────────
  deploy:
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Execute Rolling Update
        run: |
          echo "Initiating blue-green/rolling deployment strategy..."
          docker compose -f docker-compose.yml up -d --build --pull always
          # Note: In a production environment, this should interface with a 
          # proper orchestrator like Kubernetes or ECS.