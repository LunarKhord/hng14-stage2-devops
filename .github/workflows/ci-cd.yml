name: CI/CD Pipeline 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  # ──────────────────────────────────────────────────
  # Stage 1: Static Analysis
  # ──────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6                    

      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.3.0        
        with:
          dockerfile: "**/Dockerfile"

  # ──────────────────────────────────────────────────
  # Stage 2: Testing & Coverage (Absolute Pathing)
  # ──────────────────────────────────────────────────
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Execute tests
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov fakeredis httpx
          # Explicitly target the workspace root for artifacts
          pytest --cov=app --cov-report=xml:${{ github.workspace }}/coverage.xml

      - name: Persist coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: ${{ github.workspace }}/coverage.xml
          if-no-files-found: error

  # ──────────────────────────────────────────────────
  # Stage 3: Build & Security
  # ──────────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build API and Worker
        uses: docker/build-push-action@v7
        with:
          context: ./api
          push: false # Set to true if using a real registry
          tags: api:latest
          outputs: type=docker,dest=${{ github.workspace }}/api.tar

      - name: Build Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: false
          tags: frontend:latest
          outputs: type=docker,dest=${{ github.workspace }}/frontend.tar

      - name: Vulnerability Scan (API)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: 'api:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'