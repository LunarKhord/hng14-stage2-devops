name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  # Stage 1: Lint
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 api/ || true

      - name: Lint JavaScript (eslint)
        run: |
          cd frontend
          npm ci || npm install
          npm install eslint --save-dev
          npx eslint app.js || true

      - name: Lint API Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint Worker Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint Frontend Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  # Stage 2: Test
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          cd api
          pytest --cov=app --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # Stage 3: Build (with local registry, SHA+latest tags, caching)
  build:
    needs: test
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build & push API (SHA + latest)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Worker (SHA + latest)
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Frontend (SHA + latest)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save images as tarballs
        run: |
          docker save localhost:5000/api:${{ github.sha }} -o api.tar
          docker save localhost:5000/worker:${{ github.sha }} -o worker.tar
          docker save localhost:5000/frontend:${{ github.sha }} -o frontend.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            api.tar
            worker.tar
            frontend.tar

  # Stage 4: Security Scan (uses SHA tag from tarballs)
  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load images into Docker
        run: |
          docker load -i api.tar
          docker load -i worker.tar
          docker load -i frontend.tar

      - name: Scan API (SHA tag)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-api.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Scan Worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'worker:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-worker.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'frontend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-api.sarif,trivy-worker.sarif,trivy-frontend.sarif'

  # Stage 5: Integration Test
  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install system tools
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Run integration script
        run: |
          chmod +x tests/integration.sh
          ./tests/integration.sh

  # Stage 6: Deploy (rolling update simulation)
  deploy:
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Start old stack
        run: docker compose -p old -f docker-compose.yml up -d --build

      - name: Build new images
        run: docker compose -f docker-compose.yml build

      - name: Start new stack
        run: |
          docker compose -p new -f docker-compose.yml up -d
          for i in {1..12}; do
            HEALTHY=$(docker compose -p new ps --format json | jq 'select(.Health == "healthy")' | wc -l)
            if [ "$HEALTHY" -ge 4 ]; then
              echo "New stack healthy"
              docker compose -p old down || true
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed, rolling back"
          docker compose -p new down || true
          exit 1