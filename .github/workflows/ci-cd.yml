name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  security-events: write

jobs:
  # ──────────────────────────────────────────────────
  # Stage 1: Lint
  # ──────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Lint Python (flake8)
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          flake8 api/ || true

      - name: Lint JavaScript (eslint)
        run: |
          cd frontend
          npm ci || npm install
          npm install eslint --save-dev
          npx eslint app.js || true

      - name: List Dockerfiles (debug)
        run: |
          echo "Dockerfiles found:"
          find . -type f -name Dockerfile -print

      - name: Lint API Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint Worker Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint Frontend Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  # ──────────────────────────────────────────────────
  # Stage 2: Test
  # ──────────────────────────────────────────────────
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov fakeredis httpx

      - name: Run unit tests with coverage
        run: |
          cd api
          pytest --cov=app --cov-report=xml:coverage.xml --cov-report=html

      - name: List generated files (debug)
        run: |
          echo "Contents of api directory:"
          ls -la api/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # ──────────────────────────────────────────────────
  # Stage 3: Build (FIXED: build locally + load, then docker save)
  # ──────────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (local)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          load: true
          tags: |
            api:${{ github.sha }}
            api:latest

      - name: Build Worker image (local)
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          load: true
          tags: |
            worker:${{ github.sha }}
            worker:latest

      - name: Build Frontend image (local)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: |
            frontend:${{ github.sha }}
            frontend:latest

      - name: Debug built images (ensure tags exist)
        run: |
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}" | sed -n '1p;/^api\|^worker\|^frontend/p'

      - name: Save images as tarballs
        run: |
          docker save api:${{ github.sha }} -o api.tar
          docker save worker:${{ github.sha }} -o worker.tar
          docker save frontend:${{ github.sha }} -o frontend.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            api.tar
            worker.tar
            frontend.tar
          retention-days: 1

  # ──────────────────────────────────────────────────
  # Stage 4: Security Scan
  # ──────────────────────────────────────────────────
  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      # FIX: checkout so upload-sarif can fingerprint with git context (avoids "not a git repo" warning)
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load images into Docker
        run: |
          docker load -i api.tar
          docker load -i worker.tar
          docker load -i frontend.tar

      - name: Run Trivy vulnerability scanner on API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api:${{ github.sha }}
          format: sarif
          output: trivy-results-api.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Run Trivy on Worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: worker:${{ github.sha }}
          format: sarif
          output: trivy-results-worker.sarif
          severity: CRITICAL
          exit-code: "0"

      - name: Run Trivy on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: frontend:${{ github.sha }}
          format: sarif
          output: trivy-results-frontend.sarif
          severity: CRITICAL
          exit-code: "0"

      # upload-sarif supports a single file per step
      # FIX: unique category per upload to avoid "only one run ... per job per tool/category"
      - name: Upload SARIF (API)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-api.sarif
          category: trivy-api

      - name: Upload SARIF (Worker)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-worker.sarif
          category: trivy-worker

      - name: Upload SARIF (Frontend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-frontend.sarif
          category: trivy-frontend

  # ──────────────────────────────────────────────────
  # Stage 5: Integration Test
  # ──────────────────────────────────────────────────
  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install tooling (jq, curl)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Set up Docker Compose
        run: docker compose version

      - name: Start the full stack
        run: docker compose -f docker-compose.yml up -d --build

      - name: Wait for services to be healthy
        run: |
          for i in {1..12}; do
            HEALTHY=$(docker compose ps --format json | jq 'select(.Health == "healthy")' | wc -l | tr -d ' ')
            if [ "$HEALTHY" -ge 4 ]; then
              echo "All services healthy"
              docker compose ps
              exit 0
            fi
            echo "Waiting for healthy services... ($i/12) healthy=$HEALTHY"
            docker compose ps || true
            sleep 5
          done
          echo "Services did not become healthy in time"
          docker compose logs --no-color || true
          exit 1

      - name: Submit a job via frontend
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit -H "Content-Type: application/json" | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> "$GITHUB_ENV"
          echo "Submitted JOB_ID=$JOB_ID"

      - name: Poll job until completed
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s "http://localhost:3000/status/${JOB_ID}" | jq -r '.status')
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete in time"
          docker compose logs --no-color || true
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ──────────────────────────────────────────────────
  # Stage 6: Deploy (Rolling Update - local runner simulation)
  # ──────────────────────────────────────────────────
  deploy:
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Compose
        run: docker compose version

      # NOTE:
      # Pulling from localhost:5000 on GitHub runners won't work unless you run a registry here.
      # Keeping this as a best-effort no-op.
      - name: Pull latest images (old version) - best effort
        run: |
          docker pull localhost:5000/api:latest || true
          docker pull localhost:5000/worker:latest || true
          docker pull localhost:5000/frontend:latest || true

      - name: Start old stack
        run: docker compose -p old -f docker-compose.yml up -d --build

      - name: Build new images
        run: docker compose -f docker-compose.yml build

      - name: Start new stack (new version)
        run: docker compose -p new -f docker-compose.yml up -d

      - name: Wait for new stack to be healthy
        run: |
          for i in {1..12}; do
            HEALTHY=$(docker compose -p new ps --format json | jq 'select(.Health == "healthy")' | wc -l | tr -d ' ')
            if [ "$HEALTHY" -ge 4 ]; then
              echo "New stack is healthy"
              docker compose -p new ps
              exit 0
            fi
            echo "Waiting for new stack health... ($i/12) healthy=$HEALTHY"
            docker compose -p new ps || true
            sleep 5
          done
          echo "Health check failed, aborting rollover"
          docker compose -p new logs --no-color || true
          exit 1

      - name: Stop old stack (success)
        if: success()
        run: docker compose -p old down

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Rolling back to old stack"
          docker compose -p new down