name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ──────────────────────────────────────────────────
  # Stage 1: Lint
  # ──────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Lint Python (flake8)
        run: |
          pip install flake8
          flake8 api/ || true

      - name: Lint JavaScript (eslint)
        run: |
          cd frontend
          npm install eslint --save-dev
          npx eslint app.js || true

      - name: List Dockerfiles (debug)
        run: |
          echo "Dockerfiles found:"
          find . -type f -name Dockerfile -print

      - name: Lint API Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile

      - name: Lint Worker Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile

      - name: Lint Frontend Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  # ──────────────────────────────────────────────────
  # Stage 2: Test
  # ──────────────────────────────────────────────────
  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov fakeredis httpx

      - name: Run unit tests with coverage
        run: |
          cd api
          pytest --cov=app --cov-report=xml:coverage.xml --cov-report=html

      - name: List generated files (debug)
        run: |
          echo "Contents of api directory:"
          ls -la api/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # ──────────────────────────────────────────────────
  # Stage 3: Build (FIXED)
  # ──────────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (local)
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: false
          load: true
          tags: |
            api:${{ github.sha }}
            api:latest

      - name: Build Worker image (local)
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: false
          load: true
          tags: |
            worker:${{ github.sha }}
            worker:latest

      - name: Build Frontend image (local)
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          load: true
          tags: |
            frontend:${{ github.sha }}
            frontend:latest

      - name: Debug built images
        run: |
          docker images --format "table {{.Repository}}\t{{.Tag}}\t{{.ID}}" | sed -n '1p;/^api\|^worker\|^frontend/p'

      - name: Save images as tarballs
        run: |
          docker save api:${{ github.sha }} -o api.tar
          docker save worker:${{ github.sha }} -o worker.tar
          docker save frontend:${{ github.sha }} -o frontend.tar

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            api.tar
            worker.tar
            frontend.tar
          retention-days: 1

  # ──────────────────────────────────────────────────
  # Stage 4: Security Scan
  # ──────────────────────────────────────────────────
  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images

      - name: Load images into Docker
        run: |
          docker load -i api.tar
          docker load -i worker.tar
          docker load -i frontend.tar

      - name: Run Trivy vulnerability scanner on API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results-api.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Run Trivy on Worker
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'worker:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results-worker.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      - name: Run Trivy on Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'frontend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results-frontend.sarif'
          severity: 'CRITICAL'
          exit-code: '1'

      # upload-sarif only takes ONE file per step; do 3 steps
      - name: Upload SARIF (API)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-api.sarif

      - name: Upload SARIF (Worker)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-worker.sarif

      - name: Upload SARIF (Frontend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results-frontend.sarif

  # ──────────────────────────────────────────────────
  # Stage 5: Integration Test
  # ──────────────────────────────────────────────────
  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Compose
        run: docker compose version

      - name: Start the full stack
        run: docker compose -f docker-compose.yml up -d

      - name: Wait for services to be healthy
        run: |
          for i in {1..12}; do
            HEALTHY=$(docker compose ps --format json | jq 'select(.Health == "healthy")' | wc -l)
            if [ "$HEALTHY" -ge 4 ]; then
              echo "All services healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Services did not become healthy in time"
          exit 1

      - name: Submit a job via frontend
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit -H "Content-Type: application/json" | jq -r '.job_id')
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll job until completed
        run: |
          for i in {1..30}; do
            STATUS=$(curl -s http://localhost:3000/status/${{ env.JOB_ID }} | jq -r '.status')
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ──────────────────────────────────────────────────
  # Stage 6: Deploy (Rolling Update)
  # ──────────────────────────────────────────────────
  deploy:
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Compose
        run: docker compose version

      # NOTE: these localhost:5000 pulls only work if you have a real reachable registry in deploy env.
      # Keeping your logic as-is, but this won't pull anything in GitHub-hosted runners.
      - name: Pull latest images (old version)
        run: |
          docker pull localhost:5000/api:latest || true
          docker pull localhost:5000/worker:latest || true
          docker pull localhost:5000/frontend:latest || true

      - name: Start old stack
        run: docker compose -p old -f docker-compose.yml up -d

      - name: Build new images
        run: docker compose -f docker-compose.yml build

      - name: Start new stack (new version)
        run: docker compose -p new -f docker-compose.yml up -d

      - name: Wait for new stack to be healthy
        run: |
          for i in {1..12}; do
            HEALTHY=$(docker compose -p new ps --format json | jq 'select(.Health == "healthy")' | wc -l)
            if [ "$HEALTHY" -ge 4 ]; then
              echo "New stack is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Health check failed, aborting rollover"
          exit 1

      - name: Stop old stack (success)
        if: success()
        run: docker compose -p old down

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Rolling back to old stack"
          docker compose -p new down